name: Ruby

on:
  push:
    branches:
      - master

  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.2"
          - "3.3"
          - "3.4"
          - "4.0"

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run the default task
        run: bundle exec rake

  appraisal:
    runs-on: ubuntu-latest
    name: Appraisal ${{ matrix.appraisal }}
    strategy:
      fail-fast: false
      matrix:
        appraisal:
          - rails-7.2
          - rails-8.1

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true
      - name: Install appraisal bundle
        run: bundle exec appraisal ${{ matrix.appraisal }} bundle install
      - name: Run tests
        run: bundle exec appraisal ${{ matrix.appraisal }} rake test
